services:
  # systemctl enable systemd-networkd-wait-online , systemctl edit systemd-networkd-wait-online , ExecStart=/lib/systemd/systemd-networkd-wait-online --interface=XXX , systemctl daemon-reload
  minecraft:
    restart: ${RESTART_POLICY:-unless-stopped}
    image: docker.io/itzg/minecraft-server:java21
    container_name: minecraft-atm
    hostname: minecraft-atm
    tty: true
    stdin_open: true
    labels:
      gamecontainermanager.enable: true
      gamecontainermanager.group: "Minecraft"
      gamecontainermanager.customlabel0: "atm.${PERSONAL_DOMAINE_NAME}"
    environment:
      TZ: Europe/Paris
      ALLOW_FLIGHT: "true"
      BROADCAST_CONSOLE_TO_OPS: TRUE
      BROADCAST_RCON_TO_OPS: TRUE
      CF_SLUG: all-the-mons
      CF_API_KEY: ${CF_API_KEY}
      CREATE_CONSOLE_IN_PIPE: TRUE
      ENABLE_AUTOPAUSE: FALSE
      ENFORCE_WHITELIST: TRUE
      EULA: TRUE
      ENABLE_STATUS: TRUE
      ENABLE_QUERY: TRUE
      ICON: https://media.forgecdn.net/avatars/thumbnails/1567/555/64/64/639016249214580144.png
      MAX_PLAYERS: 6
      MAX_TICK_TIME : -1
      MOD_PLATFORM: AUTO_CURSEFORGE
      MEMORY: "28G"
      MOTD: "§b§l§oRaBByT Season 6:§r§l§o§2 All The Mons\n§6§kCest rigolo cette ligne qui bouge tout le temps"
      PAUSE_WHEN_EMPTY_SECONDS: -1
      RCON_CMDS_STARTUP: |-
        gamerule playersSleepingPercentage 1
        kill @e[type=item]
      RCON_PASSWORD: ${PERSONAL_RCON_PWD}
      RCON_PORT: ${PERSONAL_PORT_MINECRAFT_RCON}
    volumes:
      - /${DOCKER_DATA_DIRECTORY:?data path is required}/docker/docker-data/minecraft/s6/prod:/data
      - nfs_backups:/data/simplebackups
    ports:
      - ${PERSONAL_PORT_MINECRAFT}:25565
    networks:
      - games

volumes:
  nfs_backups: ## Le nom de mon volume en montage NFS
    driver: local
    name: minecraft_atm_nfs_backups
    driver_opts:
      type: nfs
      o: addr=${PERSONAL_NETWORK}.2,nolock,rw,soft,timeo=600,retrans=15
      device: ":/mnt/hdd/backup/Games/Minecraft/s6"

networks:
  games:
    name: games