services:
  python-fleur:
    restart: unless-stopped
    image: python:3.12-alpine3.21
    container_name: python-fleur
    hostname: python-fleur
    labels:
      diun.enable: true
      diun.watch_repos: true
      traefik.enable: true
      traefik.http.routers.python-fleur.tls: true
      traefik.http.routers.python-fleur.entrypoints: websecure
      traefik.http.routers.python-fleur.rule: Host(`fleur.${PERSONAL_DOMAINE_NAME}`)
      traefik.http.routers.python-fleur.service: python-fleur
      traefik.http.services.python-fleur.loadBalancer.server.port: 5000
    environment: 
      TZ: Europe/Paris
    volumes:
      - /${DOCKER_DATA_DIRECTORY:?data path is required}/docker/docker-data/websites/fleurs:/data
    env_file:
      - .env
    command:
    - sh
    - -c
    - > 
      apk add --no-cache sqlite && cd /data &&
      pip install -r requirements.txt && python3 /data/app.py
    networks:
    - webinternal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  python-fleur:
    name: python-fleur

networks:
  webinternal:
    name: webinternal